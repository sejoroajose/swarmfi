name: SwarmFi CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, "feat/stage-*"]

jobs:
  # ── Job 1: Unit tests — no AXL nodes, no 0G network ──────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install httpx pydantic anyio tenacity structlog \
                      python-dotenv rich pytest pytest-asyncio respx

      - name: Run unit tests (Stage 1 + Stage 2)
        run: python3 -m pytest tests/ -m unit -v --tb=short

  # ── Job 2: Integration tests — real AXL mesh ─────────────────────────────
  integration-axl:
    name: Integration Tests (Live AXL Mesh)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go 1.25
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          pip install httpx pydantic anyio tenacity structlog \
                      python-dotenv rich pytest pytest-asyncio respx

      - name: Build AXL binary
        run: |
          git clone --depth 1 https://github.com/gensyn-ai/axl.git axl/axl-repo
          cd axl/axl-repo
          go build -o ../../axl/node ./cmd/node/
          echo "AXL binary: $(ls -lh ../../axl/node)"

      - name: Generate agent keys
        run: |
          mkdir -p axl/keys
          for AGENT in researcher risk executor; do
            openssl genpkey -algorithm ed25519 -out axl/keys/${AGENT}.pem
            chmod 600 axl/keys/${AGENT}.pem
          done

      - name: Grant AXL network capabilities
        run: sudo setcap cap_net_admin+eip axl/node

      - name: Start AXL nodes
        run: |
          chmod +x scripts/*.sh
          bash scripts/start_nodes.sh
          echo "Waiting for mesh to settle..."
          # Poll until coords are populated (up to 30s)
          for i in $(seq 1 30); do
            COORDS=$(curl -sf http://127.0.0.1:9002/topology \
              | python3 -c "
                import sys, json
                d = json.load(sys.stdin)
                coords = [p.get('coords') for p in d.get('peers', [])]
                print('ready' if any(c for c in coords) else 'waiting')
                " 2>/dev/null || echo "waiting")
            echo "Attempt $i: $COORDS"
            [[ "$COORDS" == "ready" ]] && break
            sleep 1
          done

      - name: Verify nodes are healthy
        run: bash scripts/health_check.sh

      - name: Run AXL integration tests
        run: python3 -m pytest tests/test_connectivity.py -m integration -v --tb=short

      - name: Upload node logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: axl-logs
          path: axl/logs/
          retention-days: 3

      - name: Stop nodes
        if: always()
        run: bash scripts/stop_nodes.sh

  # ── Job 3: 0G Storage integration — requires funded testnet wallet ────────
  integration-0g:
    name: Integration Tests (0G Testnet)
    runs-on: ubuntu-latest
    # Only runs when ZG_PRIVATE_KEY secret is configured in the repo
    if: ${{ vars.RUN_0G_TESTS == 'true' || github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install httpx pydantic anyio tenacity structlog \
                      python-dotenv rich pytest pytest-asyncio respx \
                      web3 eth-account

      - name: Run 0G storage integration tests
        env:
          ZG_PRIVATE_KEY: ${{ secrets.ZG_PRIVATE_KEY }}
        run: |
          python3 -m pytest tests/test_storage_integration.py \
            -m integration -v --tb=short