name: SwarmFi CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, "feat/stage-*"]

jobs:
  # ── Job 1: All unit tests ─────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Stages 1–4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install httpx pydantic anyio tenacity structlog \
                      python-dotenv rich pytest pytest-asyncio respx

      - name: Run all unit tests
        run: python3 -m pytest tests/ -m unit -v --tb=short

  # ── Job 2: AXL mesh integration ───────────────────────────────────────────
  integration-axl:
    name: Integration Tests (AXL Mesh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"
          cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python deps
        run: |
          pip install httpx pydantic anyio tenacity structlog \
                      python-dotenv rich pytest pytest-asyncio respx

      - name: Build AXL binary
        run: |
          git clone --depth 1 https://github.com/gensyn-ai/axl.git axl/axl-repo
          go build -C axl/axl-repo -o ../../axl/node ./cmd/node/

      - name: Generate agent keys
        run: |
          mkdir -p axl/keys
          for AGENT in researcher risk executor; do
            openssl genpkey -algorithm ed25519 -out axl/keys/${AGENT}.pem
            chmod 600 axl/keys/${AGENT}.pem
          done

      - name: Grant AXL network capabilities
        run: sudo setcap cap_net_admin+eip axl/node

      - name: Start nodes and wait for mesh
        run: |
          chmod +x scripts/*.sh
          bash scripts/start_nodes.sh
          for i in $(seq 1 30); do
            COORDS=$(curl -sf http://127.0.0.1:9002/topology \
              | python3 -c "
                import sys,json
                d=json.load(sys.stdin)
                print('ready' if any(p.get('coords') for p in d.get('peers',[])) else 'waiting')
                " 2>/dev/null || echo "waiting")
            echo "Attempt $i: $COORDS"
            [[ "$COORDS" == "ready" ]] && break
            sleep 1
          done

      - name: Health check
        run: bash scripts/health_check.sh

      - name: Run AXL integration tests
        run: python3 -m pytest tests/test_connectivity.py -m integration -v --tb=short

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: axl-logs
          path: axl/logs/
          retention-days: 3

      - name: Stop nodes
        if: always()
        run: bash scripts/stop_nodes.sh

  # ── Job 3: 0G Storage integration ────────────────────────────────────────
  integration-0g:
    name: Integration Tests (0G Testnet)
    runs-on: ubuntu-latest
    if: vars.RUN_0G_TESTS == 'true' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install deps
        run: pip install httpx pydantic anyio tenacity structlog python-dotenv rich pytest pytest-asyncio respx web3 eth-account
      - name: Run 0G integration tests
        env:
          ZG_PRIVATE_KEY: ${{ secrets.ZG_PRIVATE_KEY }}
        run: python3 -m pytest tests/test_storage_integration.py -m integration -v --tb=short

  # ── Job 4: Uniswap API integration ────────────────────────────────────────
  integration-uniswap:
    name: Integration Tests (Uniswap API)
    runs-on: ubuntu-latest
    if: vars.RUN_UNISWAP_TESTS == 'true' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install deps
        run: pip install httpx pydantic anyio tenacity structlog python-dotenv rich pytest pytest-asyncio respx
      - name: Run Uniswap integration tests
        env:
          UNISWAP_API_KEY: ${{ secrets.UNISWAP_API_KEY }}
          WALLET_ADDRESS:  ${{ secrets.WALLET_ADDRESS }}
        run: python3 -m pytest tests/test_uniswap_integration.py -m integration -v --tb=short

  # ── Job 5: KeeperHub integration ──────────────────────────────────────────
  integration-keeperhub:
    name: Integration Tests (KeeperHub)
    runs-on: ubuntu-latest
    if: vars.RUN_KEEPERHUB_TESTS == 'true' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install deps
        run: pip install httpx pydantic anyio tenacity structlog python-dotenv rich pytest pytest-asyncio respx
      - name: Run KeeperHub integration tests
        env:
          KEEPERHUB_API_KEY: ${{ secrets.KEEPERHUB_API_KEY }}
        run: python3 -m pytest tests/test_keeperhub_integration.py -m integration -v --tb=short